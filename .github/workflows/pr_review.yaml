name: Gemini PR Reviewer with MCP

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 💡 競合を防ぐため、仮想環境を作ってその中に pip インストールする
      - name: Install dependencies in virtual environment
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install mcp google-genai

      # 💡 実行時も仮想環境をアクティベートしてスクリプトを叩く
      - name: Run AI Reviewer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          source .venv/bin/activate
          python scripts/mcp_reviewer.py
